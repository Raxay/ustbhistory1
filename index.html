<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京科技大学 · 校史档案</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            北科校史档案 <span>USTB History</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">首页</a></li>
            <li><a href="timeline.html">时间线</a></li>
            <li><a href="search.html">搜索</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <header class="hero">
        <h1>北京科技大学</h1>
        <p class="subtitle">追溯钢铁摇篮的辉煌历程 · 见证七秩风华</p>
        <div class="search-box">
            <input type="text" id="homeSearch" placeholder="搜索校史事件、人物、关键词..."
                   onkeydown="if(event.key==='Enter')goSearch(this.value)">
            <button onclick="goSearch(document.getElementById('homeSearch').value)">搜索</button>
        </div>
        <div class="era-nav" id="eraNav"></div>
    </header>

    <!-- 精选故事 -->
    <div class="container">
        <div class="section-header">
            <h2>精选历史故事</h2>
            <p>回望峥嵘岁月，重温钢铁精神</p>
        </div>
        <div class="featured-grid" id="featuredGrid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>北京科技大学 · 校史档案 &mdash; 记录钢铁摇篮的光辉历程</p>
        <p style="margin-top:4px;">数据来源：北京科技大学官网、校史馆、百度百科</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 年代导航
        document.getElementById('eraNav').innerHTML = renderEraNav(null);

        // 精选故事（展示6个代表性事件）
        const featured = HISTORY_DATA.filter(d => [1, 3, 21, 8, 20, 10].includes(d.id));
        document.getElementById('featuredGrid').innerHTML = featured.map(d => renderCard(d)).join('');

        // 导航栏年代跳转
        document.querySelectorAll('.era-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const era = this.textContent;
                window.location.href = 'search.html?era=' + encodeURIComponent(era);
            });
        });
    </script>
</body>
</html>
